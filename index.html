<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module">
    import { encode } from './encode.js';
    import { decode } from './decode.js';

    const AMOUNT = 5000;

    let chain = ['leaf'];

    for (let i = 0; i < AMOUNT; i++)
      chain = [chain];

    console.time('encode');
    chain = encode(chain);
    console.timeEnd('encode');

    console.time('decode');
    chain = decode(chain);
    console.timeEnd('decode');

    for (let i = 0; i < AMOUNT; i++)
      chain = chain[0];

    console.log(chain);

  </script>
</head>
</html>
